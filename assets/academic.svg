<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 268" width="100%" role="img" aria-label="Academic Journey">
<defs>
<filter id="cshadow" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity=".45"/></filter>
<linearGradient id="pnl" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0B1020"/><stop offset="1" stop-color="#080B16"/></linearGradient><linearGradient id="stx" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#22D3EE" stop-opacity="0"/><stop offset=".5" stop-color="#7CC4FF"/><stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/></linearGradient><linearGradient id="pbr" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#22D3EE" stop-opacity=".38"/><stop offset=".5" stop-color="#ffffff" stop-opacity=".07"/><stop offset="1" stop-color="#8B5CF6" stop-opacity=".38"/></linearGradient><pattern id="pdots" width="24" height="24" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1" fill="#9FC4FF" opacity=".05"/></pattern><linearGradient id="phl" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#fff" stop-opacity="0"/><stop offset=".5" stop-color="#fff" stop-opacity=".30"/><stop offset="1" stop-color="#fff" stop-opacity="0"/></linearGradient>
<linearGradient id="acc0" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#22D3EE"/><stop offset="1" stop-color="#3B82F6"/></linearGradient>
<radialGradient id="ag0" cx="0" cy="0" r="1" gradientTransform="translate(40 40) scale(120)"><stop offset="0" stop-color="#22D3EE" stop-opacity=".22"/><stop offset="1" stop-color="#22D3EE" stop-opacity="0"/></radialGradient>
<linearGradient id="acc1" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#8B5CF6"/><stop offset="1" stop-color="#C084FC"/></linearGradient>
<radialGradient id="ag1" cx="0" cy="0" r="1" gradientTransform="translate(40 40) scale(120)"><stop offset="0" stop-color="#8B5CF6" stop-opacity=".22"/><stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/></radialGradient>
</defs>
<style>
    .card{opacity:0;animation:in 1s cubic-bezier(.34,1.56,.64,1) forwards}
    .c0{animation-delay:.15s} .c1{animation-delay:.35s}
    @keyframes in{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
    .acc{transform-origin:center;animation:bar 3.6s ease-in-out infinite}
    @keyframes bar{0%,100%{opacity:.7}50%{opacity:1}}
    .cap{transform-box:fill-box;transform-origin:center;animation:sway 4.5s ease-in-out infinite}
    @keyframes sway{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(6deg)}}
    .ring{transform-box:fill-box;transform-origin:center;animation:sp 14s linear infinite;opacity:.5}
    @keyframes sp{to{transform:rotate(360deg)}}
    .stt{opacity:0;animation:stfu .8s cubic-bezier(.34,1.56,.64,1) .1s forwards}@keyframes stfu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.stl{transform-origin:center;transform:scaleX(0);animation:stg 1s cubic-bezier(.16,1,.3,1) .35s forwards}@keyframes stg{to{transform:scaleX(1)}}
    </style>
<rect x="1.5" y="1.5" width="997" height="265" rx="26" fill="url(#pnl)"/><rect x="1.5" y="1.5" width="997" height="265" rx="26" fill="url(#pdots)"/><rect x="1.5" y="1.5" width="997" height="265" rx="26" fill="none" stroke="url(#pbr)" stroke-width="1.2"/><rect x="200" y="1.2" width="600" height="1.6" rx="1" fill="url(#phl)"/>
