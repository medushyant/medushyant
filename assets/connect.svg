<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 86" width="100%" role="img" aria-label="Let us connect">
<defs><linearGradient id="pnl" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0B1020"/><stop offset="1" stop-color="#080B16"/></linearGradient><linearGradient id="stx" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#22D3EE" stop-opacity="0"/><stop offset=".5" stop-color="#7CC4FF"/><stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/></linearGradient><linearGradient id="pbr" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#22D3EE" stop-opacity=".38"/><stop offset=".5" stop-color="#ffffff" stop-opacity=".07"/><stop offset="1" stop-color="#8B5CF6" stop-opacity=".38"/></linearGradient><pattern id="pdots" width="24" height="24" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1" fill="#9FC4FF" opacity=".05"/></pattern><linearGradient id="phl" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#fff" stop-opacity="0"/><stop offset=".5" stop-color="#fff" stop-opacity=".30"/><stop offset="1" stop-color="#fff" stop-opacity="0"/></linearGradient></defs>
<style>.stt{opacity:0;animation:stfu .8s cubic-bezier(.34,1.56,.64,1) .1s forwards}@keyframes stfu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.stl{transform-origin:center;transform:scaleX(0);animation:stg 1s cubic-bezier(.16,1,.3,1) .35s forwards}@keyframes stg{to{transform:scaleX(1)}}</style>
<rect x="1.5" y="1.5" width="997" height="83" rx="26" fill="url(#pnl)"/><rect x="1.5" y="1.5" width="997" height="83" rx="26" fill="url(#pdots)"/><rect x="1.5" y="1.5" width="997" height="83" rx="26" fill="none" stroke="url(#pbr)" stroke-width="1.2"/><rect x="200" y="1.2" width="600" height="1.6" rx="1" fill="url(#phl)"/>
<text class="stt" x="500.0" y="46" text-anchor="middle" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="24" font-weight="800" letter-spacing="4" fill="#EAF1FF">LET'S CONNECT</text><rect class="stl" x="350.0" y="58" width="300" height="2.5" rx="2" fill="url(#stx)"/>
</svg>