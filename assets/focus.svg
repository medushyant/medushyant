<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 214" width="100%" role="img" aria-label="Focus Areas">
<defs>
<filter id="fsh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#000" flood-opacity=".4"/></filter>
<linearGradient id="pnl" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0B1020"/><stop offset="1" stop-color="#080B16"/></linearGradient><linearGradient id="stx" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#22D3EE" stop-opacity="0"/><stop offset=".5" stop-color="#7CC4FF"/><stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/></linearGradient><linearGradient id="pbr" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#22D3EE" stop-opacity=".38"/><stop offset=".5" stop-color="#ffffff" stop-opacity=".07"/><stop offset="1" stop-color="#8B5CF6" stop-opacity=".38"/></linearGradient><pattern id="pdots" width="24" height="24" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1" fill="#9FC4FF" opacity=".05"/></pattern><linearGradient id="phl" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#fff" stop-opacity="0"/><stop offset=".5" stop-color="#fff" stop-opacity=".30"/><stop offset="1" stop-color="#fff" stop-opacity="0"/></linearGradient>
<radialGradient id="fg0" cx="1" cy="0" r="1.2" gradientTransform="translate(0 0)"><stop offset="0" stop-color="#22D3EE" stop-opacity=".20"/><stop offset="1" stop-color="#22D3EE" stop-opacity="0"/></radialGradient>
<radialGradient id="fg1" cx="1" cy="0" r="1.2" gradientTransform="translate(0 0)"><stop offset="0" stop-color="#3B82F6" stop-opacity=".20"/><stop offset="1" stop-color="#3B82F6" stop-opacity="0"/></radialGradient>
<radialGradient id="fg2" cx="1" cy="0" r="1.2" gradientTransform="translate(0 0)"><stop offset="0" stop-color="#8B5CF6" stop-opacity=".20"/><stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/></radialGradient>
<radialGradient id="fg3" cx="1" cy="0" r="1.2" gradientTransform="translate(0 0)"><stop offset="0" stop-color="#C084FC" stop-opacity=".20"/><stop offset="1" stop-color="#C084FC" stop-opacity="0"/></radialGradient>
</defs>
<style>
    .fc{opacity:0;animation:fin .9s cubic-bezier(.34,1.56,.64,1) forwards}
    @keyframes fin{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .fbar{transform-origin:center;animation:fb 3.4s ease-in-out infinite}
    @keyframes fb{0%,100%{opacity:.65}50%{opacity:1}}
    .fg{transform-box:fill-box;transform-origin:center;animation:ff 4.6s ease-in-out infinite}
    @keyframes ff{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
    .stt{opacity:0;animation:stfu .8s cubic-bezier(.34,1.56,.64,1) .1s forwards}@keyframes stfu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.stl{transform-origin:center;transform:scaleX(0);animation:stg 1s cubic-bezier(.16,1,.3,1) .35s forwards}@keyframes stg{to{transform:scaleX(1)}}
    </style>
<rect x="1.5" y="1.5" width="997" height="211" rx="26" fill="url(#pnl)"/><rect x="1.5" y="1.5" width="997" height="211" rx="26" fill="url(#pdots)"/><rect x="1.5" y="1.5" width="997" height="211" rx="26" fill="none" stroke="url(#pbr)" stroke-width="1.2"/><rect x="200" y="1.2" width="600" height="1.6" rx="1" fill="url(#phl)"/>
<text class="stt" x="500.0" y="40" text-anchor="middle" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="24" font-weight="800" letter-spacing="4" fill="#EAF1FF">FOCUS AREAS</text><rect class="stl" x="350.0" y="52" width="300" height="2.5" rx="2" fill="url(#stx)"/>
<g transform="translate(0,58)">
<g class="fc" style="animation-delay:0.1s">
<rect x="30.0" y="20" width="218.5" height="116" rx="18" fill="rgba(255,255,255,.05)" stroke="rgba(255,255,255,.12)" stroke-width="1.1" filter="url(#fsh)"/>
<rect x="30.0" y="20" width="218.5" height="116" rx="18" fill="url(#fg0)"/>
<rect class="fbar" x="43.0" y="34" width="4" height="88" rx="2" fill="#22D3EE"/>
<g transform="translate(202.5,38) scale(1.25)" stroke="#22D3EE" color="#22D3EE"><g class="fg" style="animation-delay:-0.0s"><g fill="none" stroke-width="1.6" stroke-linecap="round"><circle cx="4" cy="6" r="2"/><circle cx="4" cy="18" r="2"/><circle cx="12" cy="12" r="2.2"/><circle cx="20" cy="6" r="2"/><circle cx="20" cy="18" r="2"/><path d="M6 6.8 10 11M6 17.2 10 13M14 11 18 6.8M14 13 18 17.2"/></g></g></g>
<text x="60.0" y="94" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="17.5" font-weight="800" fill="#EAF1FF">Machine Learning</text>
<text x="60.0" y="116" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="600" letter-spacing=".3" fill="#9DB2DA">models &amp; PyTorch</text>
</g>
<g class="fc" style="animation-delay:0.22s">
<rect x="270.5" y="20" width="218.5" height="116" rx="18" fill="rgba(255,255,255,.05)" stroke="rgba(255,255,255,.12)" stroke-width="1.1" filter="url(#fsh)"/>
<rect x="270.5" y="20" width="218.5" height="116" rx="18" fill="url(#fg1)"/>
<rect class="fbar" x="283.5" y="34" width="4" height="88" rx="2" fill="#3B82F6"/>
<g transform="translate(443.0,38) scale(1.25)" stroke="#3B82F6" color="#3B82F6"><g class="fg" style="animation-delay:-0.3s"><g fill="none" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"><path d="M11 2.5 C11.6 8.2 14.3 10.9 20 11.5 C14.3 12.1 11.6 14.8 11 20.5 C10.4 14.8 7.7 12.1 2 11.5 C7.7 10.9 10.4 8.2 11 2.5 Z"/><path d="M19 3 C19.2 4.9 19.6 5.3 21.5 5.5 C19.6 5.7 19.2 6.1 19 8 C18.8 6.1 18.4 5.7 16.5 5.5 C18.4 5.3 18.8 4.9 19 3 Z"/></g></g></g>
<text x="300.5" y="94" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="17.5" font-weight="800" fill="#EAF1FF">Generative AI</text>
<text x="300.5" y="116" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="600" letter-spacing=".3" fill="#9DB2DA">LLMs &amp; RAG</text>
</g>
<g class="fc" style="animation-delay:0.34s">
<rect x="511.0" y="20" width="218.5" height="116" rx="18" fill="rgba(255,255,255,.05)" stroke="rgba(255,255,255,.12)" stroke-width="1.1" filter="url(#fsh)"/>
<rect x="511.0" y="20" width="218.5" height="116" rx="18" fill="url(#fg2)"/>
<rect class="fbar" x="524.0" y="34" width="4" height="88" rx="2" fill="#8B5CF6"/>
<g transform="translate(683.5,38) scale(1.25)" stroke="#8B5CF6" color="#8B5CF6"><g class="fg" style="animation-delay:-0.6s"><g stroke-width="1.6" stroke-linecap="round" fill="none"><path d="M4 20V11M10 20V5M16 20V14M22 20V8"/></g></g></g>
<text x="541.0" y="94" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="17.5" font-weight="800" fill="#EAF1FF">Data Science</text>
<text x="541.0" y="116" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="600" letter-spacing=".3" fill="#9DB2DA">geospatial analytics</text>
</g>
<g class="fc" style="animation-delay:0.46s">
<rect x="751.5" y="20" width="218.5" height="116" rx="18" fill="rgba(255,255,255,.05)" stroke="rgba(255,255,255,.12)" stroke-width="1.1" filter="url(#fsh)"/>
<rect x="751.5" y="20" width="218.5" height="116" rx="18" fill="url(#fg3)"/>
<rect class="fbar" x="764.5" y="34" width="4" height="88" rx="2" fill="#C084FC"/>
<g transform="translate(924.0,38) scale(1.25)" stroke="#C084FC" color="#C084FC"><g class="fg" style="animation-delay:-0.9s"><g fill="none" stroke-width="1.6" stroke-linejoin="round"><path d="M12 3 22 8 12 13 2 8Z"/><path d="M2 13 12 18 22 13"/><path d="M2 17 12 22 22 17"/></g></g></g>
<text x="781.5" y="94" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="17.5" font-weight="800" fill="#EAF1FF">Distributed Systems</text>
<text x="781.5" y="116" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="600" letter-spacing=".3" fill="#9DB2DA">swarms &amp; edge</text>
</g>
</g>
</svg>